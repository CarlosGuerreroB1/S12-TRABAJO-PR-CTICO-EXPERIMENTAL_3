<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}VisionAI — Detección en Tiempo Real{% endblock %}</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #11141a;
      --surface2: #181c24;
      --border: #1e2330;
      --accent: #00e5a0;
      --accent2: #0090ff;
      --danger: #ff4060;
      --warn: #ffb820;
      --text: #e8ecf4;
      --muted: #6b7591;
      --radius: 12px;
      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .nav-brand .logo-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .nav-brand span {
      font-size: 1.15rem; font-weight: 700; color: var(--text);
      letter-spacing: -0.5px;
    }
    .nav-links { display: flex; gap: 0.25rem; margin-left: auto; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      padding: 6px 14px; border-radius: 8px;
      font-size: 0.9rem; font-weight: 500;
      transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--text); background: var(--surface2);
    }
    .nav-links a.active { color: var(--accent); }

    /* LAYOUT */
    main { flex: 1; padding: 2rem; max-width: 1280px; margin: 0 auto; width: 100%; }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .card-title {
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted); margin-bottom: 1rem;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
      text-decoration: none; font-family: inherit;
    }
    .btn-primary {
      background: var(--accent); color: #0a0c10;
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger {
      background: var(--danger); color: white;
    }
    .btn-danger:hover { filter: brightness(1.1); }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    /* BADGE */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-green { background: rgba(0,229,160,0.15); color: var(--accent); }
    .badge-blue  { background: rgba(0,144,255,0.15); color: var(--accent2); }
    .badge-red   { background: rgba(255,64,96,0.15);  color: var(--danger); }
    .badge-warn  { background: rgba(255,184,32,0.15); color: var(--warn); }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 10px 16px;
      font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* SELECT */
    select {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; font-family: inherit; font-size: 0.9rem;
      cursor: pointer; outline: none;
    }
    select:focus { border-color: var(--accent); }

    /* STAT CARD */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
    }
    .stat-value { font-size: 2.2rem; font-weight: 700; line-height: 1; font-family: var(--mono); }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px;
      font-size: 0.9rem; z-index: 9999;
      transform: translateY(100px); opacity: 0;
      transition: all 0.3s; pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--accent); color: var(--accent); }
    #toast.error   { border-color: var(--danger); color: var(--danger); }

    /* FOOTER */
    footer {
      text-align: center; padding: 1.5rem;
      color: var(--muted); font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<nav>
  <a href="{% url 'detector:index' %}" class="nav-brand">
    <div class="logo-mark">👁</div>
    <span>VisionAI</span>
  </a>
  <div class="nav-links">
    <a href="{% url 'detector:index' %}" class="{% if request.resolver_match.url_name == 'index' %}active{% endif %}">Dashboard</a>
    <a href="{% url 'detector:live' %}" class="{% if request.resolver_match.url_name == 'live' %}active{% endif %}">Cámara en Vivo</a>
    <a href="{% url 'detector:history' %}" class="{% if request.resolver_match.url_name == 'history' %}active{% endif %}">Historial</a>
    <a href="/admin/" target="_blank" style="margin-left: 1rem;">Admin</a>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  VisionAI — Sistema de Detección en Tiempo Real &nbsp;·&nbsp; OpenCV + Django &nbsp;·&nbsp; {% now "Y" %}
</footer>

<div id="toast"></div>

<script>
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3000);
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
